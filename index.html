<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chill Desk</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="load"><canvas id="load-particles"></canvas><div id="load-glow"></div><h1>chill desk</h1><div id="lbw"><div id="lb"></div></div></div>
<canvas id="bg"></canvas>
<canvas id="c3d"></canvas>
<div id="td"></div>
<!-- Pomodoro focus timer -->
<div id="pomo" title="点击开始专注">
  <svg id="pomo-ring" viewBox="0 0 44 44"><circle cx="22" cy="22" r="20" fill="none" stroke="rgba(200,150,70,.15)" stroke-width="2.5"/><circle id="pomo-arc" cx="22" cy="22" r="20" fill="none" stroke="rgba(220,175,100,.8)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="125.66" stroke-dashoffset="125.66" transform="rotate(-90 22 22)"/></svg>
  <span id="pomo-label">25:00</span>
</div>
<!-- Background crossfade snapshot -->
<div id="bg-snap"></div>
<div id="ebadge">编辑模式 — 拖动物品重新摆放</div>
<div id="panel-overlay"></div>
<div id="keyhint">快捷键: L灯 C吊灯 M音乐 A氛围 N日夜 E编辑 F全屏</div>
<div id="shelf" role="dialog" aria-label="物品架">
  <h2>物品架</h2><p>点击开关切换上桌 / 收起</p>
  <div id="shelf-list" role="list"></div>
  <button id="shelf-reset" title="恢复默认布局">恢复默认</button>
</div>
<div id="bgp" role="dialog" aria-label="背景选择">
  <h2>背景</h2>
  <div id="bg-list" role="listbox"></div>
</div>
<div id="brpop">
  <label>☀ 亮度</label>
  <input id="brs" type="range" min="0" max="100" value="50">
  <span id="brv">50</span>
</div>
<div id="bar">
  <span id="ttl">chill desk</span>
  <div class="sep"></div>
  <div class="btn-group" role="group" aria-label="面板">
    <button class="btn" id="b-items" aria-label="物品架" title="物品架 (I)">📦</button>
    <button class="btn" id="b-bg" aria-label="背景切换" title="背景 (B)">🌄</button>
  </div>
  <div class="sep"></div>
  <div class="btn-group" role="group" aria-label="灯光与氛围">
    <button class="btn" id="b-lamp" role="switch" aria-checked="false" aria-label="台灯" title="台灯 (L)">💡</button>
    <button class="btn" id="b-ceil" role="switch" aria-checked="false" aria-label="吊灯" title="吊灯 (C)">🔦</button>
    <button class="btn" id="b-candle" role="switch" aria-checked="false" aria-label="蜡烛" title="蜡烛 (K)">🕯</button>
    <button class="btn" id="b-music" role="switch" aria-checked="false" aria-label="音乐" title="音乐 (M)">🎵</button>
    <button class="btn" id="b-ambient" aria-label="氛围音" title="氛围 (A)">🎧</button>
  </div>
  <div class="sep"></div>
  <div class="btn-group" role="group" aria-label="场景">
    <button class="btn" id="b-dn" role="switch" aria-checked="false" aria-label="日夜切换" title="日夜 (N)">🌙</button>
    <button class="btn" id="b-bright" aria-label="亮度调节" title="亮度 (.)">🔆</button>
    <button class="btn" id="b-fs" aria-label="全屏" title="全屏 (F)">⛶</button>
  </div>
  <div class="sep"></div>
  <div class="btn-group" role="group" aria-label="编辑">
    <button class="btn" id="b-edit" role="switch" aria-checked="false" aria-label="编辑模式" title="编辑 (E)">✏️</button>
    <button class="btn btn-sm" id="b-lang" aria-label="Language" title="中/EN">EN</button>
  </div>
  <div id="sp" aria-hidden="true">
    <div class="sb" style="--t:.55s;--h:5px"></div>
    <div class="sb" style="--t:.38s;--h:14px"></div>
    <div class="sb" style="--t:.62s;--h:9px"></div>
    <div class="sb" style="--t:.44s;--h:16px"></div>
    <div class="sb" style="--t:.71s;--h:7px"></div>
  </div>
</div>

<!-- Ambient sounds panel -->
<div id="ambient-panel">
  <div id="ambient-header"><span>🎧 氛围音效</span></div>
  <div class="amb-row" data-sound="rain"><span class="amb-icon">🌧</span><span class="amb-name">雨声</span><input class="amb-vol" type="range" min="0" max="100" value="70"><div class="amb-tog" role="switch" aria-checked="false" tabindex="0"></div></div>
  <div class="amb-row" data-sound="fire"><span class="amb-icon">🔥</span><span class="amb-name">壁炉</span><input class="amb-vol" type="range" min="0" max="100" value="70"><div class="amb-tog" role="switch" aria-checked="false" tabindex="0"></div></div>
  <div class="amb-row" data-sound="wave"><span class="amb-icon">🌊</span><span class="amb-name">海浪</span><input class="amb-vol" type="range" min="0" max="100" value="70"><div class="amb-tog" role="switch" aria-checked="false" tabindex="0"></div></div>
  <div class="amb-row" data-sound="bird"><span class="amb-icon">🐦</span><span class="amb-name">鸟鸣</span><input class="amb-vol" type="range" min="0" max="100" value="70"><div class="amb-tog" role="switch" aria-checked="false" tabindex="0"></div></div>
  <div class="amb-row" data-sound="wind"><span class="amb-icon">💨</span><span class="amb-name">风声</span><input class="amb-vol" type="range" min="0" max="100" value="70"><div class="amb-tog" role="switch" aria-checked="false" tabindex="0"></div></div>
</div>

<!-- Music player panel -->
<div id="music-panel">
  <div id="music-header">
    <span>🎵 音乐</span>
    <button id="music-close">✕</button>
  </div>
  <div id="music-tabs">
    <button class="mtab on" data-src="lofi" title="Lo-fi">☕</button>
    <button class="mtab" data-src="spotify" title="Spotify">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.6 0 12 0zm5.5 17.3c-.2.3-.6.4-1 .2-2.7-1.6-6-2-10-1.1-.4.1-.7-.2-.8-.5-.1-.4.2-.7.5-.8 4.3-1 8-.6 11 1.2.4.2.5.6.3 1zm1.5-3.3c-.3.4-.8.5-1.2.3-3-1.9-7.7-2.4-11.3-1.3-.4.1-.9-.1-1-.5-.1-.4.1-.9.5-1 4.1-1.3 9.2-.7 12.6 1.5.4.2.5.7.4 1zm.1-3.4c-3.7-2.2-9.7-2.4-13.2-1.3-.5.2-1.1-.1-1.2-.6-.2-.5.1-1.1.6-1.2 4-1.2 10.7-1 14.9 1.5.5.3.6.9.4 1.4-.3.4-.9.5-1.5.2z"/></svg>
    </button>
    <button class="mtab" data-src="netease" title="网易云音乐">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="6.5" fill="none" stroke="currentColor" stroke-width="1" opacity=".4"/></svg>
    </button>
  </div>
  <div id="music-body">
    <div class="msrc on" data-src="lofi">
      <div id="lofi-player">
        <div id="lofi-info">
          <span id="lofi-title"></span>
          <span id="lofi-artist"></span>
        </div>
        <div id="lofi-controls">
          <button id="lofi-prev" title="上一首">⏮</button>
          <button id="lofi-play" title="播放/暂停">▶</button>
          <button id="lofi-next" title="下一首">⏭</button>
          <button id="lofi-shuffle" title="随机">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
          </button>
        </div>
      </div>
      <iframe id="sc-widget" width="100%" height="20" scrolling="no" frameBorder="0" allow="autoplay; encrypted-media" style="border:none;opacity:0;pointer-events:none;margin-top:-4px"></iframe>
    </div>
    <div class="msrc" data-src="spotify">
      <iframe class="music-iframe" data-lazy-src="https://open.spotify.com/embed/playlist/0vvXsWCC9xrXsKd4FyS8kM?utm_source=generator&theme=0"
        width="100%" height="152" frameBorder="0"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy"></iframe>
      <a class="music-ext-link" href="https://accounts.spotify.com/login" target="_blank" rel="noopener">未能播放？先登录 Spotify 再回来 →</a>
    </div>
    <div class="msrc" data-src="netease">
      <iframe class="music-iframe netease-iframe" data-lazy-src="https://music.163.com/outchain/player?type=0&id=2778056894&auto=0&height=90"
        width="100%" height="120" frameBorder="0"
        loading="lazy"></iframe>
      <a class="music-ext-link" href="https://music.163.com/#/login" target="_blank" rel="noopener">未能播放？先登录网易云音乐再回来 →</a>
    </div>
  </div>
</div>

<script src="https://w.soundcloud.com/player/api.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
